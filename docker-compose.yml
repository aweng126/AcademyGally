services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Bind mount to project-local ./data so PDFs/figures/DB stay in the repo directory
      - ./data:/data
      # Cache fastembed model between container restarts (avoids re-download)
      - fastembed-cache:/root/.cache/fastembed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* vars are baked into the bundle at build time
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  fastembed-cache:
